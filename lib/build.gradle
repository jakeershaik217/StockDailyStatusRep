plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // https://mvnrepository.com/artifact/io.rest-assured/rest-assured
implementation group: 'io.rest-assured', name: 'rest-assured', version: '4.5.0'
// https://mvnrepository.com/artifact/io.rest-assured/json-path
implementation group: 'io.rest-assured', name: 'json-path', version: '4.5.0'
// https://mvnrepository.com/artifact/io.rest-assured/json-schema-validator
implementation group: 'io.rest-assured', name: 'json-schema-validator', version: '4.5.0'
// https://mvnrepository.com/artifact/io.rest-assured/xml-path
implementation group: 'io.rest-assured', name: 'xml-path', version: '4.5.0'
// https://mvnrepository.com/artifact/com.jayway.jsonpath/json-path
implementation group: 'com.jayway.jsonpath', name: 'json-path', version: '2.6.0'
// https://mvnrepository.com/artifact/org.apache.commons/commons-email
implementation group: 'org.apache.commons', name: 'commons-email', version: '1.5'
// https://mvnrepository.com/artifact/org.testng/testng
testImplementation group: 'org.testng', name: 'testng', version: '6.14.3'


}

task DailyRun(type: Test) {
useTestNG(){
suites 'testng.xml'
}
}
